<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>発言クイズ</title>

<style>
* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #f5f5f5;
  color: #222;
}

.wrap {
  max-width: 720px;
  min-height: 100dvh;
  margin: 0 auto;
  padding: 10px;
}

.card {
  width: 100%;
  min-height: calc(100dvh - 20px);
  background: white;
  border-radius: 18px;
  padding: 16px;
  box-shadow: none;
}

.hidden {
  display: none !important;
}

h1, h2, h3 {
  margin: 0 0 14px;
}

p {
  line-height: 1.6;
}

input, button {
  width: 100%;
  font-size: 16px;
  border-radius: 14px;
  padding: 13px;
  margin: 7px 0;
}

input {
  border: 1px solid #ccc;
}

button {
  border: none;
  background: #222;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.sub {
  background: #eee;
  color: #222;
}

.mode {
  background: #f0f0f0;
  color: #222;
}

.mode.selected {
  background: #222;
  color: white;
}

.top {
  position: sticky;
  top: 0;
  z-index: 20;
  background: white;
  padding: 4px 0 10px;
  display: flex;
  justify-content: space-between;
  gap: 8px;
}

.badge {
  background: #eee;
  border-radius: 999px;
  padding: 8px 12px;
  font-size: 15px;
  font-weight: bold;
}

.question {
  white-space: pre-wrap;
  font-size: 17px;
  line-height: 1.65;
  background: #f7f7f7;
  border-radius: 14px;
  padding: 14px;
  margin: 12px 0;
}

.game-layout {
  display: flex;
  flex-direction: column;
  min-height: calc(100dvh - 52px);
}

.question-area {
  flex: 1;
  padding-bottom: 12px;
}

.choice-area {
  position: sticky;
  bottom: 0;
  z-index: 30;
  background: white;
  padding-top: 10px;
  border-top: 1px solid #eee;
}

#options {
  display: grid;
  grid-template-columns: 1fr;
  gap: 8px;
  max-height: 42dvh;
  overflow-y: auto;
  padding-right: 2px;
}

.option {
  background: #f0f0f0;
  color: #222;
  text-align: left;
  min-height: 52px;
  padding: 13px 14px;
  font-size: 16px;
  line-height: 1.35;
  border-radius: 14px;
}

.option.selected {
  outline: 3px solid #222;
}

.option.correct {
  background: #c8f7c5;
}

.option.wrong {
  background: #ffc9c9;
}

#nextBtn {
  position: sticky;
  bottom: 8px;
  z-index: 40;
  margin-top: 12px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.18);
}

.row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  border-bottom: 1px solid #eee;
  padding: 9px 0;
}

.row span:first-child {
  overflow-wrap: anywhere;
}

.small {
  color: #666;
  font-size: 13px;
}

.result-item {
  border: 1px solid #eee;
  border-radius: 12px;
  padding: 12px;
  margin: 10px 0;
  background: #fafafa;
}

.result-question {
  white-space: pre-wrap;
  font-size: 14px;
  line-height: 1.6;
  margin-bottom: 8px;
}

.correct-text {
  color: #16803a;
  font-weight: bold;
}

.wrong-text {
  color: #c62828;
  font-weight: bold;
}

@media (min-width: 600px) {
  .wrap {
    display: flex;
    align-items: center;
  }

  .card {
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  }

  #options {
    grid-template-columns: 1fr 1fr;
    max-height: 45dvh;
  }

  .choice-area {
    position: static;
    border-top: none;
  }
}
</style>
</head>

<body>
<div class="wrap">

  <div class="card" id="login">
    <h1>発言クイズ</h1>

    <button class="mode selected" id="soloModeBtn">一人で遊ぶ</button>
    <button class="mode" id="battleModeBtn">二人で対戦する</button>

    <input id="nameInput" placeholder="名前">
    <input id="roomInput" placeholder="合言葉" class="hidden">

    <button id="joinBtn">開始</button>

    <p class="small">
      一人用：回答後すぐ次の問題へ進めます。<br>
      対戦用：同じ合言葉の人と同じ問題で勝負します。10問、各15秒です。<br>
      同点の場合は、合計回答時間が短い方が勝ちです。
    </p>

    <p class="small" id="status"></p>
  </div>

  <div class="card hidden" id="lobby">
    <h2>待機室</h2>
    <p class="small">Room: <b id="roomLabel"></b></p>

    <h3>参加者</h3>
    <div id="players"></div>

    <button id="startBtn">開始</button>
    <button class="sub" id="resetBtn">リセット</button>

    <p class="small">
      参加者がそろったら開始してください。開始した人が進行役になります。
    </p>
  </div>

  <div class="card hidden" id="game">
    <div class="game-layout">

      <div class="question-area">
        <div class="top">
          <div class="badge" id="countLabel">1 / 10</div>
          <div class="badge">残り <span id="timeLabel">15.0</span> 秒</div>
        </div>

        <div class="question" id="questionText"></div>

        <p class="small" id="answerInfo"></p>

        <h2 style="margin-top:18px;">スコア</h2>
        <div id="scores"></div>
      </div>

      <div class="choice-area">
        <div id="options"></div>
        <button id="nextBtn" class="hidden">次の問題へ</button>
      </div>

    </div>
  </div>

  <div class="card hidden" id="result">
    <h2>結果</h2>
    <div id="resultBoard"></div>

    <h2 style="margin-top:20px;">正誤一覧</h2>
    <div id="reviewBoard"></div>

    <button onclick="location.reload()">戻る</button>
  </div>

</div>

<script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>

<script>
const BROKER = "wss://broker.emqx.io:8084/mqtt";
const QUIZ_FILE = "quiz_data.json";

const QUESTION_COUNT = 10;
const TIME_LIMIT = 15;

const NAME_MAPPING = {
  "○高顔面中知能低身長": "管理人",
  "今日はブラック！": "脱獄イカ",
  "脱獄イカ": "脱獄イカ",
  "みもずり": "ささみ",
  "みみささぐ": "ささみ",
  "いながきごろう": "いながきごろう",
  "◇ﾌﾘｺﾋ": "フリカフィ",
  "フリカフィ": "フリカフィ",
  "躁動なフリカフィ": "フリカフィ",
  "○ロイコ": "○ロイコ",
  "ぱつ": "ぱつ",
  "_✩⃝めめ": "めめ",
  "☆めめ": "めめ",
  "おにちろ": "おにちろ",
  "闇鬼ちろ": "おにちろ",
  "おにせちろるど": "おにちろ",
  "復活のちろ": "おにちろ",
  "じゃくちろ2026/5/15禁煙": "おにちろ",
  "🦪やどん": "なんく",
  "オーラ見えます": "ゆーまる",
  "久石奏(才能100%)": "久石奏"
};

const CANONICAL_NAMES = [...new Set(Object.values(NAME_MAPPING))];

let mode = "solo";

let quizRaw = [];

let solo = {
  rounds: [],
  index: 0,
  phase: "answer",
  startedAt: 0,
  score: 0,
  totalTimeMs: 0,
  answers: []
};

let playerId = localStorage.getItem("quiz_player_id");
if (!playerId) {
  playerId = crypto.randomUUID();
  localStorage.setItem("quiz_player_id", playerId);
}

let playerName = "";
let roomId = "";
let client = null;

let baseTopic = "";
let stateTopic = "";
let eventTopic = "";
let playerTopic = "";

let players = {};

let state = {
  mode: "lobby",
  hostId: null,
  rounds: [],
  index: 0,
  phase: "lobby",
  startedAt: 0,
  answers: {},
  scores: {},
  times: {},
  history: []
};

let tickStarted = false;

function $(id) {
  return document.getElementById(id);
}

function show(id) {
  ["login", "lobby", "game", "result"].forEach(x => {
    $(x).classList.add("hidden");
  });
  $(id).classList.remove("hidden");
}

function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}

function sanitizeRoom(s) {
  return s
    .trim()
    .replace(/[^\w\-ぁ-んァ-ヶ一-龠]/g, "_")
    .slice(0, 64);
}

function normalizeName(name) {
  const raw = String(name).trim();

  if (NAME_MAPPING[raw]) {
    return NAME_MAPPING[raw];
  }

  for (const key of Object.keys(NAME_MAPPING)) {
    if (raw.includes(key)) {
      return NAME_MAPPING[key];
    }
  }

  return null;
}

function escapeHtml(s) {
  return String(s)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatSec(ms) {
  return (ms / 1000).toFixed(2);
}

async function loadQuiz() {
  const res = await fetch(QUIZ_FILE, { cache: "no-store" });

  if (!res.ok) {
    throw new Error("quiz_data.json を読み込めません");
  }

  const raw = await res.json();

  quizRaw = raw
    .filter(x =>
      x &&
      typeof x.name === "string" &&
      typeof x.text === "string" &&
      x.name.trim() &&
      x.text.trim()
    )
    .map(x => ({
      name: normalizeName(x.name),
      text: x.text.trim()
    }))
    .filter(x => x.name && x.text);

  if (CANONICAL_NAMES.length < 2) {
    throw new Error("選択肢生成には最低2人必要です");
  }

  if (quizRaw.length < QUESTION_COUNT) {
    throw new Error("問題候補が10個以上必要です");
  }
}

function makeRounds() {
  const ids = [...Array(quizRaw.length).keys()];
  shuffle(ids);

  return ids.slice(0, QUESTION_COUNT).map(id => {
    const options = [...CANONICAL_NAMES];
    shuffle(options);

    return {
      qid: id,
      options: options
    };
  });
}

function getQuestionFromRound(round) {
  const item = quizRaw[round.qid];
  const correctName = item.name;
  const answerIndex = round.options.indexOf(correctName);

  return {
    text: item.text,
    answerName: correctName,
    options: round.options,
    answer: answerIndex
  };
}

function currentSoloQuestion() {
  return getQuestionFromRound(solo.rounds[solo.index]);
}

function currentBattleQuestion() {
  return getQuestionFromRound(state.rounds[state.index]);
}

function publish(topic, data, retain = false) {
  if (!client || !client.connected) return;

  client.publish(topic, JSON.stringify(data), {
    qos: 1,
    retain: retain
  });
}

function publishEmpty(topic) {
  if (!client || !client.connected) return;

  client.publish(topic, "", {
    qos: 1,
    retain: true
  });
}

function publishState() {
  publish(stateTopic, state, true);
}

function publishPlayer() {
  publish(`${playerTopic}/${playerId}`, {
    id: playerId,
    name: playerName,
    joinedAt: Date.now()
  }, true);
}

function publishEvent(data) {
  publish(eventTopic, {
    ...data,
    from: playerId,
    time: Date.now()
  }, false);
}

function scoreOf(id) {
  return state.scores?.[id] ?? 0;
}

function timeOf(id) {
  return state.times?.[id] ?? 0;
}

function isHost() {
  return state.hostId === playerId;
}

function rankPlayers() {
  return Object.values(players).sort((a, b) => {
    const scoreDiff = scoreOf(b.id) - scoreOf(a.id);
    if (scoreDiff !== 0) return scoreDiff;

    return timeOf(a.id) - timeOf(b.id);
  });
}

function renderLobby() {
  $("roomLabel").textContent = roomId;
  $("players").innerHTML = "";

  Object.values(players)
    .sort((a, b) => (a.joinedAt ?? 0) - (b.joinedAt ?? 0))
    .forEach(p => {
      const div = document.createElement("div");
      div.className = "row";
      div.innerHTML = `
        <span>${escapeHtml(p.name)}${p.id === playerId ? "（自分）" : ""}</span>
        <span>${scoreOf(p.id)}点</span>
      `;
      $("players").appendChild(div);
    });

  show("lobby");
}

function renderSoloGame() {
  if (solo.index >= QUESTION_COUNT) {
    renderSoloResult();
    return;
  }

  const q = currentSoloQuestion();
  const currentAnswer = solo.answers[solo.index];

  $("countLabel").textContent = `${solo.index + 1} / ${QUESTION_COUNT}`;
  $("questionText").textContent = `「${q.text}」\n\nこの発言をしたのは誰？`;
  $("options").innerHTML = "";

  q.options.forEach((op, i) => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = op;

    if (solo.phase === "reveal") {
      if (i === q.answer) {
        btn.classList.add("correct");
      }

      if (currentAnswer && i === currentAnswer.selected && i !== q.answer) {
        btn.classList.add("wrong");
      }

      if (currentAnswer && i === currentAnswer.selected) {
        btn.classList.add("selected");
      }
    }

    btn.disabled = solo.phase !== "answer";
    btn.onclick = () => answerSolo(i);

    $("options").appendChild(btn);
  });

  if (solo.phase === "answer") {
    $("answerInfo").textContent = "選択肢を選んでください。";
    $("nextBtn").classList.add("hidden");
  } else {
    if (currentAnswer.correct) {
      $("answerInfo").textContent = `正解！ +1点 / ${formatSec(currentAnswer.answerMs)}秒`;
    } else {
      $("answerInfo").textContent = `不正解。正解は ${q.answerName} / ${formatSec(currentAnswer.answerMs)}秒`;
    }

    $("nextBtn").classList.remove("hidden");
  }

  $("scores").innerHTML = `
    <div class="row">
      <span>${escapeHtml(playerName)}</span>
      <span>${solo.score}点 / ${formatSec(solo.totalTimeMs)}秒</span>
    </div>
  `;

  show("game");
}

function answerSolo(selected) {
  if (solo.phase !== "answer") return;

  const q = currentSoloQuestion();
  const correct = selected === q.answer;
  const answerMs = Math.min(Date.now() - solo.startedAt, TIME_LIMIT * 1000);

  if (correct) {
    solo.score += 1;
  }

  solo.totalTimeMs += answerMs;

  solo.answers[solo.index] = {
    qid: solo.rounds[solo.index].qid,
    text: q.text,
    correctName: q.answerName,
    selectedName: q.options[selected],
    selected: selected,
    correct: correct,
    answerMs: answerMs
  };

  solo.phase = "reveal";
  $("timeLabel").textContent = "0.0";

  renderSoloGame();
}

function nextSolo() {
  solo.index += 1;

  if (solo.index >= QUESTION_COUNT) {
    renderSoloResult();
    return;
  }

  solo.phase = "answer";
  solo.startedAt = Date.now();
  $("timeLabel").textContent = TIME_LIMIT.toFixed(1);

  renderSoloGame();
}

function renderBattleGame() {
  if (state.index >= QUESTION_COUNT || state.mode === "finished") {
    renderBattleResult();
    return;
  }

  const q = currentBattleQuestion();

  if (!q) {
    $("answerInfo").textContent = "問題データの取得に失敗しました。";
    return;
  }

  const myAnswer = state.answers?.[playerId];

  $("countLabel").textContent = `${state.index + 1} / ${QUESTION_COUNT}`;
  $("questionText").textContent = `「${q.text}」\n\nこの発言をしたのは誰？`;
  $("options").innerHTML = "";

  q.options.forEach((op, i) => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.textContent = op;

    const revealed = state.phase === "reveal";

    if (revealed && i === q.answer) {
      btn.classList.add("correct");
    }

    if (revealed && myAnswer && i === myAnswer.selected && i !== q.answer) {
      btn.classList.add("wrong");
    }

    if (myAnswer && i === myAnswer.selected) {
      btn.classList.add("selected");
    }

    btn.disabled = state.phase !== "answer" || !!myAnswer;
    btn.onclick = () => answerBattle(i);

    $("options").appendChild(btn);
  });

  if (state.phase === "answer") {
    $("nextBtn").classList.add("hidden");

    if (myAnswer) {
      $("answerInfo").textContent = `回答済みです。${formatSec(myAnswer.answerMs)}秒。他の参加者を待っています。`;
    } else {
      $("answerInfo").textContent = "選択肢を選んでください。";
    }
  } else {
    if (!myAnswer) {
      $("answerInfo").textContent = `未回答。正解は ${q.answerName}`;
    } else if (myAnswer.correct) {
      $("answerInfo").textContent = `正解！ +1点 / ${formatSec(myAnswer.answerMs)}秒`;
    } else {
      $("answerInfo").textContent = `不正解。正解は ${q.answerName} / ${formatSec(myAnswer.answerMs)}秒`;
    }

    if (isHost()) {
      $("nextBtn").classList.remove("hidden");
    } else {
      $("nextBtn").classList.add("hidden");
    }
  }

  renderBattleScores();
  show("game");
}

function renderBattleScores() {
  $("scores").innerHTML = "";

  rankPlayers().forEach(p => {
    const div = document.createElement("div");
    div.className = "row";
    div.innerHTML = `
      <span>${escapeHtml(p.name)}${p.id === playerId ? "（自分）" : ""}</span>
      <span>${scoreOf(p.id)}点 / ${formatSec(timeOf(p.id))}秒 ${state.answers?.[p.id] ? "✓" : ""}</span>
    `;
    $("scores").appendChild(div);
  });
}

function answerBattle(selected) {
  if (state.phase !== "answer") return;
  if (state.answers?.[playerId]) return;

  const q = currentBattleQuestion();
  const correct = selected === q.answer;
  const answerMs = Math.min(Date.now() - state.startedAt, TIME_LIMIT * 1000);

  publishEvent({
    type: "answer",
    index: state.index,
    selected: selected,
    selectedName: q.options[selected],
    correct: correct,
    answerMs: answerMs
  });

  state.answers[playerId] = {
    selected: selected,
    selectedName: q.options[selected],
    correct: correct,
    answerMs: answerMs
  };

  renderBattleGame();
}

function allBattlePlayersAnswered() {
  const ids = Object.keys(state.scores || {});

  if (ids.length === 0) return false;

  return ids.every(id => state.answers && state.answers[id]);
}

function recordCurrentBattleResult() {
  const q = currentBattleQuestion();
  const answersCopy = {};

  Object.keys(state.scores || {}).forEach(id => {
    const a = state.answers?.[id];

    if (a) {
      answersCopy[id] = {
        selected: a.selected,
        selectedName: a.selectedName,
        correct: a.correct,
        answerMs: a.answerMs ?? TIME_LIMIT * 1000
      };
    } else {
      answersCopy[id] = {
        selected: null,
        selectedName: null,
        correct: false,
        answerMs: TIME_LIMIT * 1000
      };

      state.times[id] = (state.times[id] ?? 0) + TIME_LIMIT * 1000;
    }
  });

  state.history[state.index] = {
    qid: state.rounds[state.index].qid,
    text: q.text,
    correctName: q.answerName,
    answers: answersCopy
  };
}

function revealBattleQuestion() {
  if (!isHost()) return;
  if (state.mode !== "playing") return;
  if (state.phase !== "answer") return;

  recordCurrentBattleResult();

  state.phase = "reveal";
  state.startedAt = Date.now();

  publishState();
  renderBattleGame();
}

function nextBattle() {
  if (!isHost()) return;

  if (state.index + 1 >= QUESTION_COUNT) {
    state.mode = "finished";
    state.phase = "finished";

    publishState();
    renderBattleResult();

    return;
  }

  state.index += 1;
  state.phase = "answer";
  state.startedAt = Date.now();
  state.answers = {};
  $("timeLabel").textContent = TIME_LIMIT.toFixed(1);

  publishState();
  renderBattleGame();
}

function startBattle() {
  state = {
    mode: "playing",
    hostId: playerId,
    rounds: makeRounds(),
    index: 0,
    phase: "answer",
    startedAt: Date.now(),
    answers: {},
    scores: {},
    times: {},
    history: []
  };

  Object.keys(players).forEach(id => {
    state.scores[id] = 0;
    state.times[id] = 0;
  });

  publishState();
  renderBattleGame();
}

function resetRoom() {
  Object.keys(players).forEach(id => {
    publishEmpty(`${playerTopic}/${id}`);
  });

  players = {};

  state = {
    mode: "lobby",
    hostId: null,
    rounds: [],
    index: 0,
    phase: "lobby",
    startedAt: 0,
    answers: {},
    scores: {},
    times: {},
    history: []
  };

  publishState();

  players[playerId] = {
    id: playerId,
    name: playerName,
    joinedAt: Date.now()
  };

  publishPlayer();
  renderLobby();
}

function tick() {
  if (mode === "solo") {
    if (solo.phase !== "answer") return;
    if (solo.index >= QUESTION_COUNT) return;

    const elapsed = (Date.now() - solo.startedAt) / 1000;
    const remain = Math.max(0, TIME_LIMIT - elapsed);

    $("timeLabel").textContent = remain.toFixed(1);

    if (remain <= 0) {
      const q = currentSoloQuestion();
      const answerMs = TIME_LIMIT * 1000;

      solo.totalTimeMs += answerMs;

      solo.answers[solo.index] = {
        qid: solo.rounds[solo.index].qid,
        text: q.text,
        correctName: q.answerName,
        selectedName: null,
        selected: null,
        correct: false,
        answerMs: answerMs
      };

      solo.phase = "reveal";
      renderSoloGame();
    }

    return;
  }

  if (mode === "battle") {
    if (state.mode !== "playing") return;

    const elapsed = (Date.now() - state.startedAt) / 1000;

    if (state.phase === "answer") {
      const remain = Math.max(0, TIME_LIMIT - elapsed);
      $("timeLabel").textContent = remain.toFixed(1);

      if (isHost() && allBattlePlayersAnswered()) {
        revealBattleQuestion();
        return;
      }

      if (isHost() && remain <= 0) {
        revealBattleQuestion();
        return;
      }
    }

    if (state.phase === "reveal") {
      $("timeLabel").textContent = "0.0";
    }
  }
}

function handleEvent(ev) {
  if (!ev || ev.type !== "answer") return;
  if (!isHost()) return;
  if (state.mode !== "playing") return;
  if (state.phase !== "answer") return;
  if (ev.index !== state.index) return;
  if (state.answers[ev.from]) return;

  const answerMs = Math.min(ev.answerMs ?? TIME_LIMIT * 1000, TIME_LIMIT * 1000);

  state.answers[ev.from] = {
    selected: ev.selected,
    selectedName: ev.selectedName,
    correct: ev.correct,
    answerMs: answerMs
  };

  if (ev.correct) {
    state.scores[ev.from] = (state.scores[ev.from] ?? 0) + 1;
  }

  state.times[ev.from] = (state.times[ev.from] ?? 0) + answerMs;

  publishState();
  renderBattleGame();

  if (allBattlePlayersAnswered()) {
    revealBattleQuestion();
  }
}

function handleState(s) {
  if (!s || !s.mode) return;

  state = s;

  if (!state.times) {
    state.times = {};
  }

  if (state.mode === "lobby") {
    renderLobby();
  } else if (state.mode === "playing") {
    renderBattleGame();
  } else if (state.mode === "finished") {
    renderBattleResult();
  }
}

function handlePlayer(data) {
  if (!data || !data.id || !data.name) return;

  players[data.id] = data;

  if (state.mode === "lobby") {
    renderLobby();
  } else {
    renderBattleScores();
  }
}

function renderSoloResult() {
  $("resultBoard").innerHTML = `
    <div class="row">
      <span>${escapeHtml(playerName)}</span>
      <span>${solo.score} / ${QUESTION_COUNT} 点 / ${formatSec(solo.totalTimeMs)}秒</span>
    </div>
  `;

  $("reviewBoard").innerHTML = "";

  solo.answers.forEach((r, i) => {
    const div = document.createElement("div");
    div.className = "result-item";

    const selected = r.selectedName === null ? "未回答" : escapeHtml(r.selectedName);
    const mark = r.correct ? "○" : "×";
    const markClass = r.correct ? "correct-text" : "wrong-text";

    div.innerHTML = `
      <div class="result-question">
        Q${i + 1}. 「${escapeHtml(r.text)}」
      </div>
      <div>正解: <b>${escapeHtml(r.correctName)}</b></div>
      <div>あなたの回答: <span class="${markClass}">${selected} ${mark}</span></div>
      <div class="small">回答時間: ${formatSec(r.answerMs)}秒</div>
    `;

    $("reviewBoard").appendChild(div);
  });

  show("result");
}

function renderBattleResult() {
  $("resultBoard").innerHTML = "";

  rankPlayers().forEach((p, i) => {
    const div = document.createElement("div");
    div.className = "row";

    div.innerHTML = `
      <span>${i + 1}位 ${escapeHtml(p.name)}</span>
      <span>${scoreOf(p.id)}点 / ${formatSec(timeOf(p.id))}秒</span>
    `;

    $("resultBoard").appendChild(div);
  });

  $("reviewBoard").innerHTML = "";

  state.history.forEach((r, i) => {
    const div = document.createElement("div");
    div.className = "result-item";

    let html = `
      <div class="result-question">
        Q${i + 1}. 「${escapeHtml(r.text)}」
      </div>
      <div>正解: <b>${escapeHtml(r.correctName)}</b></div>
    `;

    Object.values(players)
      .sort((a, b) => (a.joinedAt ?? 0) - (b.joinedAt ?? 0))
      .forEach(p => {
        const ans = r.answers?.[p.id];
        const selected = ans && ans.selectedName !== null ? escapeHtml(ans.selectedName) : "未回答";
        const correct = ans?.correct ?? false;
        const mark = correct ? "○" : "×";
        const markClass = correct ? "correct-text" : "wrong-text";
        const sec = ans?.answerMs !== undefined ? formatSec(ans.answerMs) : formatSec(TIME_LIMIT * 1000);

        html += `
          <div>
            ${escapeHtml(p.name)}:
            <span class="${markClass}">${selected} ${mark}</span>
            <span class="small"> / ${sec}秒</span>
          </div>
        `;
      });

    div.innerHTML = html;
    $("reviewBoard").appendChild(div);
  });

  show("result");
}

$("soloModeBtn").onclick = () => {
  mode = "solo";

  $("soloModeBtn").classList.add("selected");
  $("battleModeBtn").classList.remove("selected");

  $("roomInput").classList.add("hidden");
  $("joinBtn").textContent = "開始";
};

$("battleModeBtn").onclick = () => {
  mode = "battle";

  $("battleModeBtn").classList.add("selected");
  $("soloModeBtn").classList.remove("selected");

  $("roomInput").classList.remove("hidden");
  $("joinBtn").textContent = "入室";
};

$("joinBtn").onclick = async () => {
  playerName = $("nameInput").value.trim();

  if (!playerName) {
    alert("名前を入力してください");
    return;
  }

  try {
    $("status").textContent = "読み込み中...";
    await loadQuiz();
  } catch (e) {
    $("status").textContent = e.message;
    return;
  }

  if (mode === "solo") {
    solo = {
      rounds: makeRounds(),
      index: 0,
      phase: "answer",
      startedAt: Date.now(),
      score: 0,
      totalTimeMs: 0,
      answers: []
    };

    $("timeLabel").textContent = TIME_LIMIT.toFixed(1);

    if (!tickStarted) {
      tickStarted = true;
      setInterval(tick, 100);
    }

    renderSoloGame();

    return;
  }

  roomId = sanitizeRoom($("roomInput").value);

  if (!roomId) {
    alert("合言葉を入力してください");
    return;
  }

  baseTopic = `chat-quiz-simple-v4/${roomId}`;
  stateTopic = `${baseTopic}/state`;
  eventTopic = `${baseTopic}/event`;
  playerTopic = `${baseTopic}/players`;

  $("status").textContent = "接続中...";

  client = mqtt.connect(BROKER, {
    clientId: `quiz_${playerId}_${Math.random().toString(16).slice(2)}`,
    clean: true,
    reconnectPeriod: 2000,
    connectTimeout: 5000
  });

  client.on("connect", () => {
    client.subscribe(stateTopic, { qos: 1 });
    client.subscribe(eventTopic, { qos: 1 });
    client.subscribe(`${playerTopic}/+`, { qos: 1 });

    players[playerId] = {
      id: playerId,
      name: playerName,
      joinedAt: Date.now()
    };

    publishPlayer();
    renderLobby();

    if (!tickStarted) {
      tickStarted = true;
      setInterval(tick, 100);
    }
  });

  client.on("message", (topic, payload) => {
    if (payload.length === 0) return;

    let data;

    try {
      data = JSON.parse(payload.toString());
    } catch {
      return;
    }

    if (topic === stateTopic) {
      handleState(data);
    } else if (topic === eventTopic) {
      handleEvent(data);
    } else if (topic.startsWith(playerTopic)) {
      handlePlayer(data);
    }
  });

  client.on("error", () => {
    $("status").textContent = "接続エラー";
  });
};

$("startBtn").onclick = startBattle;
$("resetBtn").onclick = resetRoom;

$("nextBtn").onclick = () => {
  if (mode === "solo") {
    nextSolo();
  } else {
    nextBattle();
  }
};
</script>
</body>
</html>
